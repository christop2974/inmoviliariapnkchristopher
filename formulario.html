<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Agendar Visita - PNK Inmobiliaria</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="estilo.css">
</head>
<body>
  <!-- Header -->
  <header class="bg-light py-3 border-bottom">
    <div class="container d-flex justify-content-between align-items-center">
      <a href="index.html" class="logo-link" aria-label="Ir al inicio de Inmobiliaria PNK">
        <img src="logo.png" alt="Logo Inmobiliaria PNK" width="180">
      </a>
      <nav>
        <ul class="nav">
          <li class="nav-item"><a class="nav-link" href="index.html">Inicio</a></li>
          <li class="nav-item"><a class="nav-link" href="index.html#beneficios">Beneficios</a></li>
          <li class="nav-item"><a class="nav-link" href="index.html#contacto">Contacto</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <!-- Main -->
  <main class="container my-5">
    <h1 class="mb-4">Agendar Visita</h1>
    <p class="lead">Completa el siguiente formulario para solicitar una visita a la propiedad seleccionada.</p>

    <form class="row g-3">
      <!-- Datos personales -->
      <div class="col-md-6">
        <label for="nombre" class="form-label">Nombre Completo</label>
        <input type="text" class="form-control" id="nombre" required>
      </div>
      <div class="col-md-6">
        <label for="rut" class="form-label">RUT</label>
        <input type="text" class="form-control" id="rut" placeholder="12.345.678-9" required>
      </div>
      <div class="col-md-6">
        <label for="correo" class="form-label">Correo Electrónico</label>
        <input type="email" class="form-control" id="correo" required>
      </div>
      <div class="col-md-6">
        <label for="telefono" class="form-label">Teléfono Móvil</label>
        <input type="tel" class="form-control" id="telefono" placeholder="+56 9 1234 5678" required>
      </div>

      <!-- Datos de la propiedad -->
      <div class="col-md-6">
        <label for="codigo" class="form-label">Código de Propiedad</label>
        <input type="text" class="form-control" id="codigo" placeholder="Ej: C0125457" required>
      </div>
      <div class="col-md-6">
        <label for="tipo" class="form-label">Tipo de Propiedad</label>
        <select id="tipo" class="form-select" required>
          <option selected disabled>Seleccione...</option>
          <option>Casa</option>
          <option>Departamento</option>
          <option>Terreno</option>
        </select>
      </div>

      <!-- Fecha y hora -->
      <div class="col-md-6">
        <label for="fecha" class="form-label">Fecha de Visita</label>
        <input type="date" class="form-control" id="fecha" required>
      </div>
      <div class="col-md-6">
        <label for="hora" class="form-label">Hora de Visita</label>
        <input type="time" class="form-control" id="hora" required>
      </div>

      <!-- Comentarios -->
      <div class="col-12">
        <label for="comentarios" class="form-label">Comentarios adicionales</label>
        <textarea class="form-control" id="comentarios" rows="3" placeholder="Escriba aquí cualquier detalle adicional..."></textarea>
      </div>

      <!-- Botones -->
      <div class="col-12">
        <button type="submit" class="btn btn-primary">Enviar Solicitud</button>
        <a href="index.html" class="btn btn-outline-secondary">Volver</a>
      </div>
    </form>
  </main>

  <!-- Footer -->
  <footer class="bg-dark text-white text-center py-3 mt-5">
    <small>&copy; 2026 PNK Inmobiliaria</small>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
