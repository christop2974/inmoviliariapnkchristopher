<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Registrar Propiedad - PNK Inmobiliaria</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="estilo.css">
</head>
<body>
  <!-- Header -->
  <header class="bg-light py-3 border-bottom">
    <div class="container d-flex justify-content-between align-items-center">
      <a href="index.html" class="logo-link" aria-label="Ir al inicio de Inmobiliaria PNK">
        <img src="logo.png" alt="Logo Inmobiliaria PNK" width="180">
      </a>
      <nav>
        <ul class="nav">
          <li class="nav-item"><a class="nav-link" href="index.html">Inicio</a></li>
          <li class="nav-item"><a class="nav-link" href="registro-propietario.html">Registrarme como Propietario</a></li>
          <li class="nav-item"><a class="nav-link" href="registro-gestor.html">Registrarme como Gestor Freelance</a></li>
          <li class="nav-item"><a class="nav-link" href="registrar-propiedad.html">Registrar Propiedad</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <!-- Main -->
  <main class="container my-5">
    <h1 class="mb-4">Registrar Propiedad</h1>
    <p class="lead">Completa el formulario para publicar tu propiedad en la plataforma.</p>

    <form class="row g-3">
      <!-- Tipo de propiedad -->
      <div class="col-md-6">
        <label for="tipo" class="form-label">Tipo de Propiedad</label>
        <select id="tipo" class="form-select" required>
          <option selected disabled>Seleccione...</option>
          <option>Casa</option>
          <option>Departamento</option>
          <option>Terreno</option>
        </select>
      </div>

      <!-- Código de propiedad -->
      <div class="col-md-6">
        <label for="codigo" class="form-label">Código de Propiedad</label>
        <input type="text" class="form-control" id="codigo" placeholder="Ej: C0125457" required>
      </div>

      <!-- Ubicación -->
      <div class="col-md-4">
        <label for="provincia" class="form-label">Provincia</label>
        <select id="provincia" class="form-select" required>
          <option selected disabled>Seleccione...</option>
          <option>Elqui</option>
          <option>Limarí</option>
        </select>
      </div>
      <div class="col-md-4">
        <label for="comuna" class="form-label">Comuna</label>
        <select id="comuna" class="form-select" required>
          <option selected disabled>Seleccione...</option>
          <option>La Serena</option>
          <option>Ovalle</option>
        </select>
      </div>
      <div class="col-md-4">
        <label for="sector" class="form-label">Sector</label>
        <input type="text" class="form-control" id="sector" placeholder="Ej: El Milagro" required>
      </div>

      <!-- Características -->
      <div class="col-md-3">
        <label for="dormitorios" class="form-label">Dormitorios</label>
        <input type="number" class="form-control" id="dormitorios" min="0">
      </div>
      <div class="col-md-3">
        <label for="banos" class="form-label">Baños</label>
        <input type="number" class="form-control" id="banos" min="0">
      </div>
      <div class="col-md-3">
        <label for="areaTotal" class="form-label">Área Total (m²)</label>
        <input type="number" class="form-control" id="areaTotal" min="0">
      </div>
      <div class="col-md-3">
        <label for="areaConstruida" class="form-label">Área Construida (m²)</label>
        <input type="number" class="form-control" id="areaConstruida" min="0">
      </div>

      <!-- Precio -->
      <div class="col-md-6">
        <label for="precioPesos" class="form-label">Precio en $</label>
        <input type="number" class="form-control" id="precioPesos" min="0" required>
      </div>
      <div class="col-md-6">
        <label for="precioUF" class="form-label">Precio en UF</label>
        <input type="number" class="form-control" id="precioUF" min="0" required>
      </div>

      <!-- Descripción -->
      <div class="col-12">
        <label for="descripcion" class="form-label">Descripción</label>
        <textarea class="form-control" id="descripcion" rows="4" placeholder="Describe la propiedad..." required></textarea>
      </div>

      <!-- Fotografías -->
      <div class="col-12">
        <label for="fotos" class="form-label">Fotografías (1 a 10)</label>
        <input type="file" class="form-control" id="fotos" multiple accept="image/*">
      </div>

      <!-- Extras -->
      <div class="col-12">
        <h5>Extras</h5>
        <div class="form-check"><input class="form-check-input" type="checkbox" id="bodega"><label class="form-check-label" for="bodega">Bodega</label></div>
        <div class="form-check"><input class="form-check-input" type="checkbox" id="estacionamiento"><label class="form-check-label" for="estacionamiento">Estacionamiento</label></div>
        <div class="form-check"><input class="form-check-input" type="checkbox" id="logia"><label class="form-check-label" for="logia">Logia</label></div>
        <div class="form-check"><input class="form-check-input" type="checkbox" id="cocina"><label class="form-check-label" for="cocina">Cocina amoblada</label></div>
        <div class="form-check"><input class="form-check-input" type="checkbox" id="antejardin"><label class="form-check-label" for="antejardin">Antejardín</label></div>
        <div class="form-check"><input class="form-check-input" type="checkbox" id="patio"><label class="form-check-label" for="patio">Patio trasero</label></div>
        <div class="form-check"><input class="form-check-input" type="checkbox" id="piscina"><label class="form-check-label" for="piscina">Piscina</label></div>
      </div>

      <!-- Botones -->
      <div class="col-12">
        <button type="submit" class="btn btn-success">Registrar Propiedad</button>
        <a href="index.html" class="btn btn-outline-secondary">Volver</a>
      </div>
    </form>
  </main>

  <!-- Footer -->
  <footer class="bg-dark text-white text-center py-3 mt-5">
    <small>&copy; 2026 PNK Inmobiliaria</small>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
