<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CRUD Propiedades - PNK Inmobiliaria</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="estilo.css">
</head>
<body>
  <!-- Header -->
  <header class="bg-light py-3 border-bottom">
    <div class="container d-flex justify-content-between align-items-center">
      <h1 class="h4">Gestión de Propiedades</h1>
      <a href="dashboard.html" class="btn btn-outline-primary">Volver al Dashboard</a>
    </div>
  </header>

  <main class="container my-4">
    <!-- Botón crear nueva propiedad -->
    <div class="d-flex justify-content-end mb-3">
      <button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#modalCrearPropiedad">
        Crear Nueva Propiedad
      </button>
    </div>

    <!-- Tabla de propiedades -->
    <table class="table table-striped table-bordered">
      <thead class="table-dark">
        <tr>
          <th>ID</th>
          <th>Tipo</th>
          <th>Provincia</th>
          <th>Comuna</th>
          <th>Sector</th>
          <th>Dormitorios</th>
          <th>Baños</th>
          <th>Precio $</th>
          <th>Precio UF</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>P001</td>
          <td>Casa</td>
          <td>Elqui</td>
          <td>La Serena</td>
          <td>El Milagro</td>
          <td>3</td>
          <td>2</td>
          <td>$154.000.000</td>
          <td>UF 5.650</td>
          <td>
            <button class="btn btn-warning btn-sm">Editar</button>
            <button class="btn btn-danger btn-sm">Eliminar</button>
          </td>
        </tr>
        <tr>
          <td>P002</td>
          <td>Departamento</td>
          <td>Limarí</td>
          <td>Ovalle</td>
          <td>Centro</td>
          <td>2</td>
          <td>1</td>
          <td>$85.000.000</td>
          <td>UF 3.200</td>
          <td>
            <button class="btn btn-warning btn-sm">Editar</button>
            <button class="btn btn-danger btn-sm">Eliminar</button>
          </td>
        </tr>
        <!-- Más filas según propiedades -->
      </tbody>
    </table>
  </main>

  <!-- Modal Crear Propiedad -->
  <div class="modal fade" id="modalCrearPropiedad" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Crear Propiedad</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <form class="row g-3">
            <div class="col-md-6">
              <label class="form-label">Tipo de Propiedad</label>
              <select class="form-select" required>
                <option value="">Seleccione...</option>
                <option>Casa</option>
                <option>Departamento</option>
                <option>Terreno</option>
              </select>
            </div>
            <div class="col-md-6">
              <label class="form-label">Provincia</label>
              <input type="text" class="form-control" required>
            </div>
            <div class="col-md-6">
              <label class="form-label">Comuna</label>
              <input type="text" class="form-control" required>
            </div>
            <div class="col-md-6">
              <label class="form-label">Sector</label>
              <input type="text" class="form-control" required>
            </div>
            <div class="col-md-4">
              <label class="form-label">Dormitorios</label>
              <input type="number" class="form-control" min="0" required>
            </div>
            <div class="col-md-4">
              <label class="form-label">Baños</label>
              <input type="number" class="form-control" min="0" required>
            </div>
            <div class="col-md-4">
              <label class="form-label">Área Construida (m²)</label>
              <input type="number" class="form-control" min="0">
            </div>
            <div class="col-md-6">
              <label class="form-label">Precio $</label>
              <input type="number" class="form-control" min="0" required>
            </div>
            <div class="col-md-6">
              <label class="form-label">Precio UF</label>
              <input type="number" class="form-control" min="0" required>
            </div>
            <div class="col-12">
              <label class="form-label">Descripción</label>
              <textarea class="form-control" rows="3"></textarea>
            </div>
            <div class="col-12">
              <label class="form-label">Fotografías (1 a 10)</label>
              <input type="file" class="form-control" multiple accept=".jpg,.png">
            </div>
            <div class="col-12">
              <button type="submit" class="btn btn-success">Guardar</button>
              <button type="reset" class="btn btn-secondary">Cancelar</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <footer class="bg-dark text-white text-center py-3 mt-5">
    <small>&copy; 2026 PNK Inmobiliaria</small>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
