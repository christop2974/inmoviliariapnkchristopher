<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dashboard Inmobiliaria - PNK</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: #f8f9fa;
    }
    .card {
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }
    .card h3 {
      font-size: 2rem;
      margin: 0;
    }
  </style>
</head>
<body>
  <!-- Header -->
  <header class="bg-primary text-white py-3 mb-4">
    <div class="container d-flex justify-content-between align-items-center">
      <h1 class="h4">Dashboard Inmobiliaria</h1>
      <a href="index.html" class="btn btn-light">Volver al Inicio</a>
    </div>
  </header>

  <!-- Main -->
  <main class="container">
    <div class="row g-4">
      <!-- Propiedades registradas -->
      <div class="col-md-3">
        <div class="card text-center p-3">
          <h3>7</h3>
          <p class="text-muted">Propiedades Registradas</p>
        </div>
      </div>

      <!-- Visitas agendadas -->
      <div class="col-md-3">
        <div class="card text-center p-3">
          <h3>45</h3>
          <p class="text-muted">Visitas Agendadas</p>
        </div>
      </div>

      <!-- Clientes nuevos -->
      <div class="col-md-3">
        <div class="card text-center p-3">
          <h3>30</h3>
          <p class="text-muted">Clientes Nuevos</p>
        </div>
      </div>

      <!-- Ventas cerradas -->
      <div class="col-md-3">
        <div class="card text-center p-3">
          <h3>12</h3>
          <p class="text-muted">Ventas Cerradas</p>
        </div>
      </div>
    </div>


  <!-- Footer -->
  <footer class="bg-dark text-white text-center py-3 mt-5">
    <small>&copy; 2026 PNK Inmobiliaria</small>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
